interface:
  display_name: "Initialize Project"
  short_description: "Turn this template into a project-specific starter."
  default_prompt: >-
    Initialize this React Router template for my product. Gather any missing
    product name, package name, users, routes, auth, domain entities, branding,
    deployment, environment variables, sample CRUD, and seed-data decisions
    before editing, then update docs, code, tests, and validation consistently.
