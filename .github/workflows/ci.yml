name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: app
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      BETTER_AUTH_SECRET: ci-secret-at-least-thirty-two-characters
      BETTER_AUTH_URL: http://127.0.0.1:5173
      BETTER_AUTH_TRUSTED_ORIGINS: http://127.0.0.1:5173
      DATABASE_URL: postgresql://app:password@localhost:5432/app_test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The CI Postgres service is disposable; migrate deploy validates the committed migration set.
      - run: pnpm db:migrate:deploy
      - run: pnpm db:generate
      - run: git diff --exit-code app/lib/db/database-types.ts
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker build -t react-router-template-ci .
      - run: pnpm exec playwright install --with-deps chromium
      # Reset immediately before browser tests so future E2E cases do not inherit unit/build state.
      - run: pnpm exec prisma migrate reset --force --skip-seed
      - run: pnpm test:e2e
